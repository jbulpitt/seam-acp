  - generic [ref=e554]:
    - heading "frequently asked questions" [level=2] [ref=e555]
    - generic [ref=e556]:
      - generic [ref=e557]:
        - button "What does a fractional CTO engagement look like?" [ref=e558]:
          - generic [ref=e559]: What does a fractional CTO engagement look like?
          - img [ref=e560]
        - paragraph [ref=e562]: Typically 8–20 hours per week of embedded technical leadership. This includes architecture review, vendor evaluation, engineering team mentoring, roadmap planning, and technical due diligence. The engagement scales with your needs — some clients start at advisory level and expand to hands-on implementation.
      - generic [ref=e563]:
        - button "Do you work with startups or only enterprise?" [ref=e564]:
          - generic [ref=e565]: Do you work with startups or only enterprise?
          - img [ref=e566]
        - paragraph [ref=e568]: Both. The technical challenges are different but the engineering standards are the same. Startups typically need architecture that will survive their next growth phase. Enterprise clients need modernization velocity without destabilizing existing operations.
      - generic [ref=e569]:
        - button "What is your availability and typical lead time?" [ref=e570]:
          - generic [ref=e571]: What is your availability and typical lead time?
          - img [ref=e572]
        - paragraph [ref=e574]: Current availability varies — reach out through the contact form for the latest timeline. Most engagements begin within 1–2 weeks of signed agreement. For urgent infrastructure issues, expedited starts are possible.
      - generic [ref=e575]:
        - button "Do you provide ongoing support after project delivery?" [ref=e576]:
          - generic [ref=e577]: Do you provide ongoing support after project delivery?
          - img [ref=e578]
        - paragraph [ref=e580]: Yes. Every project includes a structured handoff with documentation and knowledge transfer. For ongoing needs, retainer engagements provide reserved capacity for operations support, incident response, and continuous improvement.
      - generic [ref=e581]:
        - button "What cloud platforms do you specialize in?" [ref=e582]:
          - generic [ref=e583]: What cloud platforms do you specialize in?
          - img [ref=e584]
        - paragraph [ref=e586]: Primary depth is in AWS, with strong operational experience across Azure and GCP. Multi-cloud architecture — including hybrid on-premises connectivity — is a core competency. The right platform depends on your regulatory, technical, and organizational constraints.
      - generic [ref=e587]:
        - button "How do you handle intellectual property and confidentiality?" [ref=e588]:
          - generic [ref=e589]: How do you handle intellectual property and confidentiality?
          - img [ref=e590]
        - paragraph [ref=e592]: All engagements operate under strict confidentiality. NDA execution is available before any technical disclosure. Code, architecture, and documentation produced during an engagement are owned by the client.
      - generic [ref=e593]:
        - button "What is your rate structure?" [ref=e594]:
          - generic [ref=e595]: What is your rate structure?
          - img [ref=e596]
        - paragraph [ref=e598]: Engagements are priced based on scope and structure — hourly for advisory, fixed-price for defined projects, monthly for retainers. Contact us to discuss your specific requirements and we will provide a tailored proposal.
